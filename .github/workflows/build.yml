name: Build Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Collect binaries
        run: |
          mkdir -p release

          # App binary — built by PlatformIO
          cp .pio/build/m5stack-atom/firmware.bin    release/firmware.bin
          cp .pio/build/m5stack-atom/bootloader.bin  release/bootloader.bin
          cp .pio/build/m5stack-atom/partitions.bin  release/partitions.bin

          # boot_app0.bin ships with the Arduino framework package
          BOOT_APP=$(find ~/.platformio/packages -name "boot_app0.bin" | head -1)
          if [ -z "$BOOT_APP" ]; then
            echo "ERROR: boot_app0.bin not found in PlatformIO packages"
            exit 1
          fi
          cp "$BOOT_APP" release/boot_app0.bin

          echo "--- Binary sizes ---"
          ls -lh release/

      - name: Upload firmware artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: release/
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ !env.ACT && startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
